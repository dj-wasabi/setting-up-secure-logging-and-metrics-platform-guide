---
global:
  rbac:
    create: true

prometheusOperator:
  serviceAccount:
    automountServiceAccountToken: false

  securityContext:
    fsGroup: 65534
    runAsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  admissionWebhooks:
    enabled: true
    deployment:
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

prometheus:
  serviceAccount:
    automountServiceAccountToken: false

  prometheusSpec:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "standard"
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 8Gi

    replicas: 2
    podAntiAffinity: "hard"
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
            app.kubernetes.io/instance: prometheus-kube-prometheus-prometheus

    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "2Gi"

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

alertmanager:
  serviceAccount:
    create: true
    automountServiceAccountToken: false

  alertmanagerSpec:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 2000
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: alertmanager

    podAntiAffinity: "hard"
    podAntiAffinityTopologyKey: kubernetes.io/hostname

    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "2Gi"

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

crds:
  upgradeJob:
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    podSecurityContext:
      fsGroup: 65534
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
      seccompProfile:
        type: RuntimeDefault
