---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-client-tls
  namespace: monitoring
spec:
  secretName: monitoring-client-tls
  commonName: monitoring-client
  issuerRef:
    name: our-own-issuer
    kind: ClusterIssuer
  privateKey:
    size: 4096
    rotationPolicy: Always
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
  usages:
    - client auth
    - digital signature
    - key encipherment
