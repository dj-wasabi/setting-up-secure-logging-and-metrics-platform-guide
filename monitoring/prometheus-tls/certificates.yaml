---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-tls
  namespace: monitoring
spec:
  secretName: prometheus-tls
  commonName: prometheus
  dnsNames:
    - prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local
    - prometheus-kube-prometheus-prometheus.monitoring.svc
    - prometheus-kube-prometheus-prometheus
    # - prometheus-prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local
    # - prometheus-prometheus-kube-prometheus-prometheus.monitoring.svc
    # - prometheus-prometheus-kube-prometheus-prometheus
  issuerRef:
    name: our-own-issuer
    kind: ClusterIssuer
  privateKey:
    size: 4096
    rotationPolicy: Always
  usages:
    - server auth
    - digital signature
    - key encipherment
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: alertmanager-tls
  namespace: monitoring
spec:
  secretName: alertmanager-tls
  dnsNames:
  - alertmanager.example.com
  - prometheus-kube-prometheus-alertmanager.monitoring.svc.cluster.local
  issuerRef:
    name: our-own-issuer
    kind: ClusterIssuer
  privateKey:
    size: 4096
    rotationPolicy: Always
