apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheus-kube-prometheus-alertmanager
  namespace: monitoring
  labels:
    release: prometheus
spec:
  endpoints:
  - enableHttp2: true
    path: /metrics
    port: http-web
    scheme: https
    tlsConfig:
      ca:
        secret:
          key: ca.crt
          name: alertmanager-tls
      cert:
        secret:
          key: tls.crt
          name: monitoring-client-tls
      keySecret:
        key: tls.key
        name: monitoring-client-tls
      serverName: prometheus-kube-prometheus-alertmanager.monitoring.svc.cluster.local
  selector:
    matchLabels:
      app: kube-prometheus-stack-alertmanager
      release: prometheus
      self-monitor: "true"
