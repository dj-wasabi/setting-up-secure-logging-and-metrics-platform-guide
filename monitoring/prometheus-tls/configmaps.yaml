---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-thanos-sidecar-http-tls-config
  namespace: monitoring
data:
  tls-config.yaml: |
    tls_server_config:
      cert_file: /etc/thanos/tls/tls.crt
      key_file: /etc/thanos/tls/tls.key
      client_ca_file: /etc/thanos/tls/ca.crt
      client_auth_type: RequireAndVerifyClientCert
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-exporter-http-tls-config
  namespace: monitoring
data:
  tls-config.yaml: |
    tls_server_config:
      cert_file: /etc/node-exporter/tls/tls.crt
      key_file: /etc/node-exporter/tls/tls.key
      client_ca_file: /etc/node-exporter/tls/ca.crt
      client_auth_type: VerifyClientCertIfGiven
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-state-metrics-http-tls-config
  namespace: monitoring
data:
  tls-config.yaml: |
    tls_server_config:
      cert_file: /etc/kube-state-metrics/tls/tls.crt
      key_file: /etc/kube-state-metrics/tls/tls.key
      client_ca_file: /etc/kube-state-metrics/tls/ca.crt
      client_auth_type: VerifyClientCertIfGiven
