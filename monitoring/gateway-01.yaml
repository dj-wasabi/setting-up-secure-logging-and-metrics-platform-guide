---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-gateway-tls
  namespace: monitoring
spec:
  secretName: monitoring-gateway-tls
  dnsNames:
  - prometheus.example.com
  - alertmanager.example.com
  - grafana.example.com
  issuerRef:
    name: our-own-issuer
    kind: ClusterIssuer
  privateKey:
    rotationPolicy: Always
