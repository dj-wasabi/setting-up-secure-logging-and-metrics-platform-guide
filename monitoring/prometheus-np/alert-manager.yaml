---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/name: alertmanager
  ingress:
  - fromEntities:
    - ingress
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "9093"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/name: prometheus
        k8s:operator.prometheus.io/name: prometheus-kube-prometheus-prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
      - port: "9093"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/name: alertmanager
    toPorts:
    - ports:
      - port: "9093"
        protocol: TCP
      - port: "9094"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/name: alertmanager
    toPorts:
    - ports:
      - port: "9094"
        protocol: TCP
      - port: "9093"
        protocol: TCP
