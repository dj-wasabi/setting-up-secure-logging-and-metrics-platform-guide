---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: node-exporter
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/instance: prometheus
      k8s:app.kubernetes.io/name: prometheus-node-exporter
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "9100"
        protocol: TCP
