---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana-ingress
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/name: grafana
      k8s:app.kubernetes.io/instance: prometheus
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "3000"
        protocol: TCP
  - fromEntities:
    - ingress
    toPorts:
    - ports:
      - port: "3000"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/instance: prometheus-kube-prometheus-prometheus
        k8s:app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "3001"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/component: query
        k8s:app.kubernetes.io/instance: thanos-query
        k8s:app.kubernetes.io/name: thanos
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
      - port: "10902"
        protocol: TCP
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
