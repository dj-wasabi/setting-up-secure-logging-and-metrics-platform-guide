---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kube-state-metrics
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/instance: kube-state-metrics
      k8s:app.kubernetes.io/name: kube-state-metrics
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/instance: prometheus-kube-prometheus-prometheus
        k8s:app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
      - port: "8081"
        protocol: TCP
  egress:
  - toEntities:
    - kube-apiserver
    - host
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
