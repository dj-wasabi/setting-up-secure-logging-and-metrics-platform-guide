apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/instance: prometheus-kube-prometheus-prometheus
      k8s:app.kubernetes.io/name: prometheus
  ingress:
  - fromEntities:
    - ingress
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
      - port: "8080"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/instance: prometheus-kube-prometheus-prometheus
        k8s:app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "10902"
        protocol: TCP
      - port: "10901"
        protocol: TCP
      - port: "9090"
        protocol: TCP
      - port: "8080"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/component: prometheus-operator
        k8s:app.kubernetes.io/instance: prometheus
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
      - port: "10250"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/instance: thanos-query
        k8s:app.kubernetes.io/name: thanos
    toPorts:
    - ports:
      - port: "10901"
        protocol: TCP
      - port: "10902"
        protocol: TCP
      - port: "9090"
        protocol: TCP

  egress:
  - toEndpoints:
    - matchLabels:
        k8s:k8s-app: kube-dns
        k8s:io.kubernetes.pod.namespace: kube-system
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
      - port: "9153"
        protocol: TCP
  - toEntities:
    - kube-apiserver
    - host
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/instance: prometheus-kube-prometheus-prometheus
        k8s:app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "10902"
        protocol: TCP
      - port: "10901"
        protocol: TCP
      - port: "9090"
        protocol: TCP
      - port: "8080"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/name: alertmanager
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
      - port: "9093"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/instance: prometheus
        k8s:app.kubernetes.io/name: prometheus-node-exporter
    toPorts:
    - ports:
      - port: "9100"
        protocol: TCP
  - toEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "9100"
        protocol: TCP

  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/instance: kube-state-metrics
        k8s:app.kubernetes.io/name: kube-state-metrics
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
      - port: "8081"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/component: prometheus-operator
        k8s:app.kubernetes.io/instance: prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
      - port: "10250"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/name: grafana
        k8s:app.kubernetes.io/instance: prometheus
    toPorts:
    - ports:
      - port: "3001"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/component: query
        k8s:app.kubernetes.io/instance: thanos-query
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
      - port: "10901"
        protocol: TCP
      - port: "10902"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/component: storegateway
        k8s:app.kubernetes.io/instance: thanos-query
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/component: compactor
        k8s:app.kubernetes.io/instance: thanos-query
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:app.kubernetes.io/component: bucketweb
        k8s:app.kubernetes.io/instance: thanos-query
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: falco
        k8s:app.kubernetes.io/name: falco
    toPorts:
    - ports:
      - port: "8765"
        protocol: TCP

  - toEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "2381"
        protocol: TCP
      - port: "10249"
        protocol: TCP
      - port: "10250"
        protocol: TCP
      - port: "10255"
        protocol: TCP
      - port: "10257"
        protocol: TCP
      - port: "10259"
        protocol: TCP
  - toEntities: 
    - cluster
    toPorts:
    - ports:
      - port: "9962"
        protocol: TCP
      - port: "9963"
        protocol: TCP
      - port: "9964"
        protocol: TCP
      - port: "9965"
        protocol: TCP
      - port: "9966"
        protocol: TCP

  - toFQDNs:
    - matchPattern: "*.amazonaws.com"
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
