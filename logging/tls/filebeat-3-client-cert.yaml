apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: filebeat-client-cert
  namespace: logging
spec:
  secretName: filebeat-client-cert
  commonName: filebeat-client
  issuerRef:
    name: our-own-issuer
    kind: ClusterIssuer
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 4096
    rotationPolicy: Always
  usages:
  - client auth
