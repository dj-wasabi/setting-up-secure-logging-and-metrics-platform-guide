apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: metricbeat-client-cert
  namespace: logging
spec:
  secretName: metricbeat-client-cert
  commonName: metricbeat-client
  issuerRef:
    name: our-own-issuer
    kind: ClusterIssuer
  usages:
  - client auth
  privateKey: 
    algorithm: RSA
    encoding: PKCS8
    size: 4096
    rotationPolicy: Always
