kind: Secret
apiVersion: v1
metadata:
  name: elasticsearch-custom-roles
  namespace: logging
stringData:
  roles.yml: |-
    eck_logstash_user_role:
      cluster:
      - monitor
      - manage_ilm
      - read_ilm
      - manage_logstash_pipelines
      - manage_index_templates
      - cluster:admin/ingest/pipeline/get
      indices:
      - names:
        - logs-*
        - metrics-*
        - filebeat*
        - metricbeat*
        privileges:
        - manage
        - write
        - create_index
        - read
        - view_index_metadata
        - create
        - manage_ilm
