apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: logstash-access
  namespace: logging
spec:
  endpointSelector:
    matchLabels:
      k8s:common.k8s.elastic.co/type: logstash
      k8s:logstash.k8s.elastic.co/name: quickstart-logstash
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: logging
        k8s:common.k8s.elastic.co/type: beat
        k8s:beat.k8s.elastic.co/type: filebeat
        k8s:beat.k8s.elastic.co/name: quickstart-filebeat
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: logging
        k8s:common.k8s.elastic.co/type: beat
        k8s:beat.k8s.elastic.co/type: metricbeat
        k8s:beat.k8s.elastic.co/name: metricbeat
    toPorts:
    - ports:
      - port: "5044"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: logging
        k8s:common.k8s.elastic.co/type: elasticsearch
        k8s:elasticsearch.k8s.elastic.co/cluster-name: quickstart
    toPorts:
    - ports:
      - port: "9200"
        protocol: TCP
  - toEntities:
    - kube-apiserver
    - host
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
